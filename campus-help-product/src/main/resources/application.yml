server:
  port: 8082

spring:
  application:
    name: campus-help-product
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/campus_help?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:233615}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema-product.sql
      data-locations: classpath:db/seed-product.sql
      continue-on-error: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    # 打到控制台，便于你在 IDEA 里观察 SQL 与执行情况
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    com.campushelp: INFO
    com.baomidou.mybatisplus: DEBUG
    org.springframework.web: INFO

