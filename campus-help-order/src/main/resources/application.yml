server:
  port: ${ORDER_SERVICE_PORT:8083}

spring:
  application:
    name: campus-help-order
  cloud:
    nacos:
      discovery:
        enabled: ${NACOS_ENABLED:false}
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/campus_help?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:233615}
    driver-class-name: com.mysql.cj.jdbc.Driver
  redis:
    host: ${REDIS_HOST:127.0.0.1}
    port: ${REDIS_PORT:6379}
    database: ${REDIS_DB:0}

management:
  endpoints:
    web:
      exposure:
        include: health,info

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

campus:
  jwt:
    secret: ${JWT_SECRET:campus-help-jwt-dev-only-change-in-prod-use-env-JWT_SECRET-64chars-minimum-for-hs512!!}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  order:
    pay-timeout-minutes: ${ORDER_PAY_TIMEOUT_MINUTES:15}
    expire-scan-ms: ${ORDER_EXPIRE_SCAN_MS:30000}
product:
  service:
    base-url: ${PRODUCT_SERVICE_BASE_URL:http://127.0.0.1:8084}
